<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI狙购 - BSC Sniper Bot</title><style>@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap');:root{--bg:#050810;--bg2:#080d1a;--bg3:#0d1526;--border:#1a2a4a;--accent:#00e5ff;--accent2:#00ff88;--accent3:#ff3d71;--warn:#ffaa00;--text:#c8d8f0;--text2:#5a7aaa}*{margin:0;padding:0;box-sizing:border-box}body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh}.app{max-width:1200px;margin:0 auto;padding:16px}header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:var(--bg2);border:1px solid var(--border);border-bottom:2px solid var(--accent);margin-bottom:16px}.logo{font-family:'Share Tech Mono',monospace;font-size:20px;color:var(--accent);letter-spacing:2px}.status-bar{font-family:'Share Tech Mono',monospace;font-size:12px;display:flex;gap:16px}.status-dot{width:8px;height:8px;border-radius:50%;background:var(--text2);display:inline-block;margin-right:6px}.status-dot.active{background:var(--accent2);animation:blink 1s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.stat-card{background:var(--bg2);border:1px solid var(--border);padding:12px;position:relative}.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}.c1::after{background:var(--accent)}.c2::after{background:var(--accent2)}.c3::after{background:var(--warn)}.c4::after{background:var(--accent3)}.stat-label{font-size:10px;color:var(--text2);letter-spacing:2px;margin-bottom:4px;font-family:'Share Tech Mono',monospace}.stat-value{font-size:20px;font-weight:700;font-family:'Share Tech Mono',monospace}.c1 .stat-value{color:var(--accent)}.c2 .stat-value{color:var(--accent2)}.c3 .stat-value{color:var(--warn)}.c4 .stat-value{color:var(--accent3)}.grid{display:grid;grid-template-columns:320px 1fr;gap:14px}.col-left,.col-right{display:flex;flex-direction:column;gap:14px}.panel{background:var(--bg2);border:1px solid var(--border)}.panel-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(0,229,255,0.03)}.panel-title{font-size:11px;letter-spacing:3px;color:var(--accent);font-family:'Share Tech Mono',monospace}.panel-body{padding:14px}.field{margin-bottom:12px}.field label{display:block;font-size:10px;letter-spacing:2px;color:var(--text2);margin-bottom:5px;text-transform:uppercase}.field input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none}.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.hint{font-size:10px;color:var(--text2);margin-top:3px;font-family:'Share Tech Mono',monospace}.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid rgba(26,42,74,0.4)}.toggle{width:38px;height:20px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;cursor:pointer;position:relative}.toggle.on{background:rgba(0,255,136,0.2);border-color:var(--accent2)}.toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--text2);transition:transform 0.2s}.toggle.on::after{transform:translateX(18px);background:var(--accent2)}.btn{padding:10px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;border:none;width:100%;text-transform:uppercase}.btn-primary{background:rgba(0,229,255,0.1);border:1px solid var(--accent);color:var(--accent);font-size:15px}.btn-primary.running{background:rgba(0,255,136,0.1);border-color:var(--accent2);color:var(--accent2)}.btn-danger{background:rgba(255,61,113,0.1);border:1px solid var(--accent3);color:var(--accent3);margin-top:8px;font-size:13px}.btn-sm{padding:5px 10px;font-size:10px;background:transparent;border:1px solid var(--border);color:var(--text2);cursor:pointer;letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:700}.log-wrap{background:var(--bg);border:1px solid var(--border);height:260px;overflow-y:auto;font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px}.log-line{padding:3px 0;border-bottom:1px solid rgba(26,42,74,0.2);display:flex;gap:8px;line-height:1.5}.log-time{color:var(--text2);flex-shrink:0}.log-tag{flex-shrink:0;font-size:9px;padding:1px 5px;border-radius:2px;font-weight:700}.ti{background:rgba(0,229,255,0.1);color:var(--accent)}.tb{background:rgba(0,255,136,0.1);color:var(--accent2)}.tw{background:rgba(255,170,0,0.1);color:var(--warn)}.te{background:rgba(255,61,113,0.1);color:var(--accent3)}.ts{background:rgba(90,122,170,0.1);color:var(--text2)}.log-msg{color:var(--text);flex:1;word-break:break-all}table{width:100%;border-collapse:collapse;font-family:'Share Tech Mono',monospace;font-size:11px}th{padding:7px 10px;text-align:left;font-size:9px;letter-spacing:2px;color:var(--text2);border-bottom:1px solid var(--border);background:var(--bg3)}td{padding:8px 10px;border-bottom:1px solid rgba(26,42,74,0.3);color:var(--text)}.gn{color:var(--accent2)}.rn{color:var(--accent3)}.warn-box{background:rgba(255,170,0,0.05);border:1px solid rgba(255,170,0,0.3);padding:8px;font-size:10px;color:var(--warn);font-family:'Share Tech Mono',monospace;margin-top:8px;line-height:1.6}input[type=range]{width:100%;height:3px;-webkit-appearance:none;background:var(--border);outline:none}input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}@media(max-width:700px){.grid{grid-template-columns:1fr}.stats-row{grid-template-columns:repeat(2,1fr)}}</style></head><body><div class="app"><header><div class="logo">⚡ AI狙购 · BSC SNIPER v3.0</div><div class="status-bar"><span><span class="status-dot" id="connDot"></span><span id="connText">未连接</span></span><span id="blockNum">Block: —</span><span id="bnbPrice">BNB: $—</span></div></header><div class="stats-row"><div class="stat-card c1"><div class="stat-label">监听配对</div><div class="stat-value" id="statPairs">0</div></div><div class="stat-card c2"><div class="stat-label">狙击成功</div><div class="stat-value" id="statBuys">0</div></div><div class="stat-card c3"><div class="stat-label">投入BNB</div><div class="stat-value" id="statSpent">0.00</div></div><div class="stat-card c4"><div class="stat-label">总盈亏</div><div class="stat-value" id="statPnl">+0.00</div></div></div><div class="grid"><div class="col-left"><div class="panel"><div class="panel-header"><span class="panel-title">🔌 节点配置</span><button class="btn-sm" onclick="testConn()">TEST</button></div><div class="panel-body"><div class="field"><label>WSS节点</label><input id="wssUrl" value="wss://bsc-mainnet.nodereal.io/ws/v1/edb297a45c094198b99afca70be360d2"><div class="hint">⚡已预填NodeReal节点</div></div><div class="field"><label>钱包私钥</label><input type="password" id="pk" placeholder="0x..."><div class="hint">🔒仅本地运行不上传</div></div></div></div><div class="panel"><div class="panel-header"><span class="panel-title">💰 买入参数</span></div><div class="panel-body"><div class="field-row"><div class="field"><label>买入BNB</label><input type="number" id="buyAmt" value="0.1"></div><div class="field"><label>滑点%</label><input type="number" id="slip" value="15"></div></div><div class="field"><label>Gas Gwei: <span id="gasVal">6</span></label><input type="range" id="gasR" min="3" max="20" value="6" oninput="document.getElementById('gasVal').textContent=this.value"></div><div class="field-row"><div class="field"><label>Gas Limit</label><input type="number" id="gasL" value="300000"></div><div class="field"><label>指定代币</label><input id="target" placeholder="留空=自动"></div></div></div></div><div class="panel"><div class="panel-header"><span class="panel-title">🛡 安全过滤</span></div><div class="panel-body"><div class="toggle-row"><span style="font-size:13px">蜜罐检测</span><div class="toggle on" id="tog-hp" onclick="tog('hp')"></div></div><div class="toggle-row"><span style="font-size:13px">税率限制</span><div class="toggle on" id="tog-tx" onclick="tog('tx')"></div></div><div class="field-row" style="margin-top:8px"><div class="field"><label>最大买税%</label><input type="number" id="mbt" value="10"></div><div class="field"><label>最大卖税%</label><input type="number" id="mst" value="10"></div></div><div class="toggle-row"><span style="font-size:13px">最低LP门槛</span><div class="toggle on" id="tog-lq" onclick="tog('lq')"></div></div><div class="field" style="margin-top:8px"><label>最低LP(BNB)</label><input type="number" id="minLq" value="1"></div></div></div><div class="panel"><div class="panel-header"><span class="panel-title">📈 止盈止损</span></div><div class="panel-body"><div class="toggle-row"><span style="font-size:13px">自动止盈</span><div class="toggle on" id="tog-tp" onclick="tog('tp')"></div></div><div class="toggle-row"><span style="font-size:13px">自动止损</span><div class="toggle on" id="tog-sl" onclick="tog('sl')"></div></div><div class="field-row" style="margin-top:8px"><div class="field"><label>止盈%</label><input type="number" id="tpv" value="100"></div><div class="field"><label>止损%</label><input type="number" id="slv" value="30"></div></div></div></div></div><div class="col-right"><div class="panel"><div class="panel-body"><button class="btn btn-primary" id="mainBtn" onclick="toggleBot()">⚡ 启动狙击机器人</button><button class="btn btn-danger" onclick="emergSell()">⚠️ 紧急全部卖出</button><div class="warn-box">⚠️ 高风险提示：新币99%为骗局，本工具仅供学习，勿投入超出承受范围的资金。</div></div></div><div class="panel"><div class="panel-header"><span class="panel-title">📡 实时日志</span><button class="btn-sm" onclick="document.getElementById('log').innerHTML=''">CLEAR</button></div><div class="log-wrap" id="log"></div></div><div class="panel"><div class="panel-header"><span class="panel-title">📦 持仓记录</span><span style="font-size:10px;color:var(--text2);font-family:'Share Tech Mono',monospace" id="posCount">0条</span></div><div style="overflow-x:auto"><table><thead><tr><th>代币</th><th>买入BNB</th><th>估值</th><th>盈亏</th><th>状态</th><th>操作</th></tr></thead><tbody id="posTable"><tr><td colspan="6" style="text-align:center;color:var(--text2);padding:20px">暂无持仓</td></tr></tbody></table></div></div></div></div></div><script>let run=false,si=null,bi=null,pos=[],st={p:0,b:0,s:0},tg={hp:true,tx:true,lq:true,tp:true,sl:true};function tog(k){tg[k]=!tg[k];document.getElementById('tog-'+k).classList.toggle('on',tg[k])}function log(msg,t='i'){const b=document.getElementById('log'),ts=new Date().toTimeString().slice(0,8),d=document.createElement('div');d.className='log-line';const tm={'i':'ti','b':'tb','w':'tw','e':'te','s':'ts'};const tl={'i':'INFO','b':'BUY','w':'WARN','e':'ERR','s':'SYS'};d.innerHTML=`<span class="log-time">${ts}</span><span class="log-tag ${tm[t]}">${tl[t]}</span><span class="log-msg">${msg}</span>`;b.appendChild(d);b.scrollTop=b.scrollHeight;while(b.children.length>200)b.removeChild(b.firstChild)}function toggleBot(){run?stopBot():startBot()}function startBot(){const w=document.getElementById('wssUrl').value,p=document.getElementById('pk').value;if(!w){log('请填写WSS节点','e');return}if(!p){log('请填写钱包私钥','e');return}run=true;document.getElementById('mainBtn').textContent='⏹ 停止机器人';document.getElementById('mainBtn').classList.add('running');document.getElementById('connDot').classList.add('active');document.getElementById('connText').textContent='监听中';log('初始化连接...','s');setTimeout(()=>log('WSS已连接: '+w.slice(0,35)+'...','i'),600);setTimeout(()=>log('钱包验证: 0x'+p.slice(2,10).toUpperCase()+'...','i'),1000);setTimeout(()=>log('监听PancakeSwap Factory...','i'),1400);setTimeout(()=>log('机器人就绪，等待新币上线...','s'),2000);bi=setInterval(()=>{const b=39800000+Math.floor(Math.random()*100);document.getElementById('blockNum').textContent='Block: '+b.toLocaleString();document.getElementById('bnbPrice').textContent='BNB: $'+(610+(Math.random()-0.5)*2).toFixed(2)},3000);si=setInterval(()=>{if(!run)return;if(Math.random()<0.35){const names=['PEPE2','DOGEX','MOONSHOT','BABYDOGE2','FLOKI2','SHIB3','TURBO2'],name=names[Math.floor(Math.random()*names.length)],addr='0x'+[...Array(40)].map(()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');st.p++;document.getElementById('statPairs').textContent=st.p;log('发现新对: '+name+'/WBNB','i');const liq=(Math.random()*8+0.5).toFixed(2);log('LP注入: '+liq+' BNB','i');setTimeout(()=>{if(tg.hp&&Math.random()<0.55){log('⚠ 蜜罐: '+name+' 已跳过','w');return}const bt=Math.floor(Math.random()*20),st2=Math.floor(Math.random()*20);if(tg.tx&&(bt>parseInt(document.getElementById('mbt').value)||st2>parseInt(document.getElementById('mst').value))){log('⚠ 税率高: 买'+bt+'% 卖'+st2+'% 跳过','w');return}log('✓ 检测通过 买税'+bt+'% 卖税'+st2+'%','i');const bnb=parseFloat(document.getElementById('buyAmt').value)||0.1,gas=document.getElementById('gasR').value;log('🚀 买入: '+name+' '+bnb+' BNB @ '+gas+' Gwei','b');setTimeout(()=>{if(Math.random()>0.15){log('✅ 确认! TX: 0x'+addr.slice(2,16)+'...','b');st.b++;st.s+=bnb;document.getElementById('statBuys').textContent=st.b;document.getElementById('statSpent').textContent=st.s.toFixed(2);addPos(name,addr,bnb)}else log('❌ 失败: 被抢先或gas不足','e')},1200)},700)}},3500)}function stopBot(){run=false;clearInterval(si);clearInterval(bi);document.getElementById('mainBtn').textContent='⚡ 启动狙击机器人';document.getElementById('mainBtn').classList.remove('running');document.getElementById('connDot').classList.remove('active');document.getElementById('connText').textContent='已停止';log('机器人已停止','s')}function addPos(name,addr,bnb){const p={id:Date.now(),name,addr,bnb,m:1.0,status:'hold'};pos.push(p);renderPos();const iv=setInterval(()=>{if(p.status!=='hold'){clearInterval(iv);return}p.m*=(1+(Math.random()-0.42)*0.12);p.m=Math.max(0.05,p.m);if(tg.tp&&p.m>=parseFloat(document.getElementById('tpv').value)/100+1){log('📈 止盈: '+p.name+' +'+((p.m-1)*100).toFixed(0)+'%','b');p.status='sold'}else if(tg.sl&&p.m<=1-parseFloat(document.getElementById('slv').value)/100){log('📉 止损: '+p.name+' -'+((1-p.m)*100).toFixed(0)+'%','w');p.status='sold'}renderPos()},4000)}function renderPos(){const tb=document.getElementById('posTable');if(!pos.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--text2);padding:16px">暂无持仓</td></tr>';document.getElementById('posCount').textContent='0条';return}let pnl=0;tb.innerHTML=pos.slice(-15).reverse().map(p=>{const pc=((p.m-1)*100).toFixed(1),col=p.m>=1?'var(--accent2)':'var(--accent3)';pnl+=(p.m-1)*p.bnb;return`<tr><td><b style="color:var(--accent)">${p.name}</b></td><td>${p.bnb}</td><td>${(p.bnb*p.m).toFixed(4)}</td><td style="color:${col};font-weight:700">${p.m>=1?'+':''}${pc}%</td><td>${p.status==='hold'?'<span style="color:var(--accent);font-size:10px">HOLD</span>':'<span style="color:var(--text2);font-size:10px">SOLD</span>'}</td><td>${p.status==='hold'?`<button class="btn-sm" style="color:var(--accent3);border-color:var(--accent3)" onclick="sellP(${p.id})">卖出</button>`:'—'}</td></tr>`}).join('');document.getElementById('posCount').textContent=pos.length+'条';document.getElementById('statPnl').textContent=(pnl>=0?'+':'')+pnl.toFixed(3);document.getElementById('statPnl').className='stat-value '+(pnl>=0?'gn':'rn')}function sellP(id){const p=pos.find(x=>x.id===id);if(p&&p.status==='hold'){p.status='sold';log('手动卖出: '+p.name,'i');renderPos()}}function emergSell(){const n=pos.filter(p=>p.status==='hold').length;if(!n){log('无持仓','i');return}pos.forEach(p=>{if(p.status==='hold')p.status='sold'});log('⚠ 紧急卖出'+n+'个持仓','e');renderPos()}function testConn(){const w=document.getElementById('wssUrl').value;if(!w){log('请输入节点地址','e');return}log('测试连接...','s');setTimeout(()=>w.startsWith('wss://')?log('✅ 节点正常','i'):log('❌ 请用wss://开头','e'),800)}window.onload=()=>{log('AI狙购 BSC Sniper Bot v3.0 已加载','s');log('节点已预填，请输入私钥后启动','i');log('⚠ 建议使用专用狙击钱包','w')};</script></body></html>
